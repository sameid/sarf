<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="A simple flashcard app for learning">
    <title>Arabic Flashcards</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Scheherazade+New:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&family=Aref+Ruqaa+Ink:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body id="body">
    <div class="container">
        <div class="left-panel">
            <button id="backButton" class="back-button" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
        </div>
        <div class="right-panel">
            <div id="statsContainer" class="stats-container" style="display:none">
                <div class="stat-item">
                    <span class="stat-label">Hard</span>
                    <span class="stat-count" id="hardCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Good</span>
                    <span class="stat-count" id="goodCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Easy</span>
                    <span class="stat-count" id="easyCount">0</span>
                </div>
            </div>
            <button id="randomizeToggle" class="randomize-toggle" style="display:none">
                <span class="toggle-label">Randomize Sides</span>
                <span class="toggle-switch"></span>
            </button>
            <button id="sequentialToggle" class="sequential-toggle" style="display:none">
                <span class="toggle-label">Sequential Mode</span>
                <span class="toggle-switch"></span>
            </button>
            <button id="clearButton" class="clear-button" style="display:none">Clear</button>
        </div>
        <div id="flashcards" class="flashcards-container"></div>
        <button id="revealButton" class="reveal-button" style="display:none">Reveal Answer</button>
        <div class="rating-buttons" style="display:none">
            <button class="rating-button hard">Hard</button>
            <button class="rating-button good">Good</button>
            <button class="rating-button easy">Easy</button>
        </div>
    </div>
    
    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <p class="splash-subtitle">Arabic Flashcards</p>
            <div class="splash-divider"></div>
            <p class="splash-arabic">صَرْف</p>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>

    <!-- Menu Screen -->
    <div id="menuScreen" class="menu-screen hidden">
        <div class="menu-content">
            <p class="menu-subtitle">Arabic Flashcards</p>
            <h1 class="menu-title">Select a Deck</h1>
            <div class="menu-decks" id="menuDecks">
                <!-- Deck buttons injected by script.js -->
            </div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen hidden">
        <div class="loading-content">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
    
    <!-- Confirm Dialog -->
    <dialog id="confirmDialog" class="confirm-dialog">
        <p class="confirm-message">Clear all progress for this deck? This cannot be undone.</p>
        <div class="confirm-buttons">
            <button id="confirmCancel" class="confirm-btn-cancel">Cancel</button>
            <button id="confirmOk" class="confirm-btn-ok">Clear</button>
        </div>
    </dialog>

    <!-- Modal -->
    <div id="arabicModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <!-- Modal content will go here -->
            </div>
        </div>
    </div>

    <!-- Install button -->
    <button id="installButton" class="install-button" style="display:none">Add to Home Screen</button>

    <!-- iOS tip banner -->
    <div id="iosBanner" class="ios-banner" style="display:none">
        <span>Tap <strong>Share</strong> then <strong>Add to Home Screen</strong></span>
        <button id="iosBannerDismiss" class="ios-banner-dismiss">&times;</button>
    </div>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
